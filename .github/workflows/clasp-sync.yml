name: Sync Apps Script to GitHub

on:
  push:
    branches: [main]
    paths:
      - 'backend/apps-script/**'

jobs:
  push-to-apps-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: echo "${CLASP_CREDENTIALS}" > ~/.clasprc.json
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}

      - name: Push to Apps Script
        working-directory: backend/apps-script
        run: clasp push --force
